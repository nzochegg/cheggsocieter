<!DOCTYPE html>
<html>
    <head>
        <title>nzochegg</title>
        <meta charset="utf-8"/>
        <link rel="stylesheet" type="text/css" href="main.css">
        <script src="jquery-3.7.1.min.js"></script>
        <script src="interaction.js"></script>
        <script> 
            $(function(){
                $("#sidebarload").load("sidebar.html"); 
                $("#headerload").load("header.html"); 
                $("#footerload").load("footer.html"); 
            });
        </script> 
    </head>

    <div id="headerload"></div>

    <body id="body">
        <div id="sidebar">
            <div id="sidebar_spec">
                <div id="lien_side">
                    <div id="sidebarload"></div>
                </div>
            </div>
            <div id=accueil>
                <div class="buttons">
                    <button id="prevBtn">←</button>
                    <button id="nextBtn">→</button>
                </div>

                <div class="viewer" id="imageViewer" style="display: flex; justify-content: 'center';">
                    <!-- Les images seront insérées ici dynamiquement -->
                </div>

                <script>
                        const images = [
                          'metachim6/1.png',
                          'metachim6/2.png',
                          'metachim6/3.png',
                          'metachim6/4.png',
                          'metachim6/5.png',
                          'metachim6/6.png',
                          'metachim6/7.png',
                          'metachim6/8.png',
                          'metachim6/9.png',
                          'metachim6/10.png',
                          'metachim6/11.png',
                          'metachim6/12.png',
                          'metachim6/13.png',
                          'metachim6/14.png',
                          'metachim6/15.png',
                          'metachim6/16.png',
                          'metachim6/17.png',
                          'metachim6/18.png',
                          'metachim6/19.png',
                          'metachim6/20.png',
                          'metachim6/21.png',
                          'metachim6/22.png',
                          'metachim6/23.png',
                          'metachim6/24.png',
                          'metachim6/25.png',
                          'metachim6/26.png',
                          'metachim6/27.png',
                          'metachim6/28.png',
                          'metachim6/29.png',
                          'metachim6/30.png',
                          'metachim6/31.png',
                          'metachim6/32.png',
                        ];

                        let currentPage = 0;
                        const viewer = document.getElementById('imageViewer');
                        const prevBtn = document.getElementById('prevBtn');
                        const nextBtn = document.getElementById('nextBtn');

                        function updateViewer() {
                            viewer.innerHTML = '';

                            if (currentPage != 0) {
                                for (let i = 0; i < 2; i++) {
                                    const imgIndex = currentPage + i;
                                    if (imgIndex < images.length) {
                                        const img = document.createElement('img');
                                        img.src = images[imgIndex];
                                        img.style.width = '400px';
                                        img.style.height = 'auto';
                                        viewer.appendChild(img);
                                    }
                                }
                            } else {
                                const imgIndex = currentPage;
                                const img = document.createElement('img');
                                img.src = images[imgIndex];
                                img.style.width = '400px';
                                img.style.height = 'auto';
                                viewer.appendChild(img);
                            }

                          prevBtn.disabled = currentPage === 0;
                          nextBtn.disabled = (currentPage + 1) >= images.length;
                        }

                        prevBtn.addEventListener('click', () => {
                            if (currentPage > 0) {
                                currentPage-=2;  
                                updateViewer();
                            }
                        });

                        nextBtn.addEventListener('click', () => {
                            if ((currentPage + 1) < images.length) {
                                if (currentPage != 0) {
                                    currentPage+=2;
                                } else {  
                                    currentPage++;
                                }
                                updateViewer();
                            }
                        });

                        updateViewer();
                </script>
            </div>     
        </div>

        <!-- The Modal -->
        <div id="myModal" class="modal">
          <span class="close">×</span>
          <img class="modal-content" id="img01">
          <div id="caption"></div>
        </div>
    </body>

    <div id="footerload"></div>

</html>
